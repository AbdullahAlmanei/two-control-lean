name: Compile blueprint

on:
  push:
    branches:
      - master # Trigger on pushes to the default branch
  workflow_dispatch:        # Allow manual triggering of the workflow from the GitHub Actions interface

# Cancel previous runs if a new commit is pushed to the same PR or branch
concurrency:
  group: ${{ github.ref }}  # Group runs by the ref (branch or PR)
  cancel-in-progress: true  # Cancel any ongoing runs in the same group

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  actions: read           # Read access to workflow artifacts
  contents: read          # Read access to repository contents
  pages: write            # Write access to GitHub Pages
  id-token: write         # Write access to ID tokens
  issues: write           # Write access to issues
  pull-requests: write    # Write access to pull requests

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.0
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Build project
        uses: leanprover/lean-action@434f25c2f80ded67bba02502ad3a86f25db50709 # 2025-07-02
        with:
          build: true
          lint: false
          mk_all-check: false
          use-mathlib-cache: true

      - name: Build blueprint
        uses: xu-cheng/texlive-action@f886de8159e5952a131848a5fa9c3196a2132b5d # v2
        with:
          docker_image: ghcr.io/xu-cheng/texlive-full:20250401
          run: |
            apk update
            apk add --update make py3-pip git pkgconfig graphviz graphviz-dev gcc musl-dev
            git config --global --add safe.directory $GITHUB_WORKSPACE
            git config --global --add safe.directory `pwd`
            python3 -m venv env
            source env/bin/activate
            pip install --upgrade pip requests wheel
            pip install pygraphviz \
              --config-settings="--global-option=build_ext" \
              --config-settings="--global-option=-L/usr/lib/graphviz/" \
              --config-settings="--global-option=-R/usr/lib/graphviz/"
            pip install leanblueprint
            leanblueprint pdf
            mkdir -p home_page
            cp blueprint/print/print.pdf home_page/blueprint.pdf
            leanblueprint web
            cp -r blueprint/web home_page/blueprint

      - name: Check blueprint declarations
        run: ~/.elan/bin/lake exe checkdecls blueprint/lean_decls

      - name: Restore latest API docs
        id: restore-api-docs
        uses: dawidd6/action-download-artifact@v11
        with:
          github_token: ${{ github.token }}
          repo: ${{ github.repository }}
          workflow: api_docs.yml
          branch: master
          name: api-docs
          path: home_page/docs
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Setup Ruby for Jekyll
        uses: ruby/setup-ruby@v1
        with:
          working-directory: home_page
          ruby-version: "3.1"
          bundler-cache: true

      - name: Build homepage with Jekyll
        working-directory: home_page
        env:
          JEKYLL_GITHUB_TOKEN: ${{ github.token }}
        run: JEKYLL_ENV=production bundle exec jekyll build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: home_page/_site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4